<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — GUEDIGITAL</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
  <!-- __CONFIG_INJECT__ -->
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #050814; min-height: 100vh; display: grid; place-items: center; }
    .card {
      background: #0d1526; border: 1.5px solid #1a2540; border-radius: 22px;
      padding: 40px 32px; width: 100%; max-width: 380px;
    }
    .brand { text-align: center; margin-bottom: 32px; }
    .brand-mark {
      width: 52px; height: 52px; border-radius: 14px; margin: 0 auto 12px;
      background: linear-gradient(135deg, #19c8ff, #3157ff);
      display: grid; place-items: center; font-weight: 900; color: white; font-size: 22px;
    }
    .brand h1 { font-size: 20px; font-weight: 900; color: white; letter-spacing: -.04em; }
    .brand p { font-size: 13px; color: #6b7a99; margin-top: 4px; }
    label { display: block; font-size: 13px; font-weight: 700; color: #8a9bbf; margin-bottom: 6px; }
    input {
      width: 100%; padding: 12px 14px; border-radius: 12px;
      border: 1.5px solid #1a2540; background: #070e1f; color: white;
      font-family: 'Inter', sans-serif; font-size: 14px; outline: none; margin-bottom: 16px;
    }
    input:focus { border-color: #3157ff; }
    button {
      width: 100%; padding: 14px; border-radius: 12px; border: none;
      background: linear-gradient(135deg, #3157ff, #7c3cff);
      color: white; font-family: 'Inter', sans-serif; font-size: 15px;
      font-weight: 700; cursor: pointer; margin-top: 4px;
    }
    button:hover { opacity: .9; }
    .err { color: #ff4d6d; font-size: 13px; text-align: center; margin-top: 12px; display: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <div class="brand-mark">G</div>
      <h1>GUEDIGITAL</h1>
      <p>Admin Panel</p>
    </div>
    <form id="form-login" onsubmit="doLogin(event)">
      <label>Email</label>
      <input type="email" id="inp-email" placeholder="admin@email.com" required>
      <label>Password</label>
      <input type="password" id="inp-pass" placeholder="••••••••" required>
      <button type="submit" id="btn-login">Masuk</button>
      <div class="err" id="err-msg"></div>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script>
    const _sb = supabase.createClient(
      window.__CONFIG__?.SUPABASE_URL || '',
      window.__CONFIG__?.SUPABASE_ANON_KEY || ''
    );

    async function doLogin(e) {
      e.preventDefault();
      const email = document.getElementById('inp-email').value.trim();
      const pass = document.getElementById('inp-pass').value;
      const btn = document.getElementById('btn-login');
      const err = document.getElementById('err-msg');

      btn.textContent = 'Memuat...';
      btn.disabled = true;
      err.style.display = 'none';

      try {
        const { data, error } = await _sb.auth.signInWithPassword({ email, password: pass });
        if (error) throw new Error('Email atau password salah.');

        // Cek is_admin
        const { data: profile } = await _sb.from('profiles').select('is_admin').eq('id', data.user.id).single();
        if (!profile?.is_admin) {
          await _sb.auth.signOut();
          throw new Error('Akses ditolak. Kamu bukan admin.');
        }

        window.location.href = '/admin/index.html';
      } catch (ex) {
        err.textContent = ex.message;
        err.style.display = 'block';
        btn.textContent = 'Masuk';
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
